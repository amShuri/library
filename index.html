<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Meow+Script&family=Ubuntu&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Online Library</title>
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <h1 class="header__title">Library</h1>
        <button class="header__new-book">New Book</button>
      </div>
    </header>

    <main class="main">
      <div class="main__container"></div>
    </main>

    <div class="prompt-bg"></div>
    <div class="prompt-box">
      <form action="#" id="book-form">
        <h3>Add New Book</h3>
        <div>
          <label for="title">Title</label>
          <input type="text" id="title" name="title" required />
        </div>

        <div>
          <label for="author">Author</label>
          <input type="text" id="author" name="author" required />
        </div>

        <div>
          <label for="genre">Genre</label>
          <input type="text" id="genre" name="genre" required />
        </div>

        <div class="checkbox-container">
          <label for="read">I have read this book</label>
          <input type="checkbox" name="read" id="read" />
        </div>
      </form>
      <button class="prompt-box__add-book" form="book-form">ADD BOOK</button>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
